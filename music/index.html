<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>>L Music</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg-main: #0a0a0c;
            --bg-sidebar: #121216;
            --bg-card: #1a1a20;
            --accent-primary: #00f0ff;
            --accent-secondary: #ff0055;
            --text-main: #e0e0e0;
            --text-muted: #6b6b7b;
            --border-color: #2a2a35;
            --hover-glow: rgba(0, 240, 255, 0.15);
            --modal-bg: rgba(10, 10, 12, 0.85);
            --badge-bg: #22222a;
            --badge-text: #a0a0b0;
        }

        body.light-mode {
            --bg-main: #f4f4f8;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --accent-primary: #ff00aa;
            --accent-secondary: #00c3ff;
            --text-main: #2d2d35;
            --text-muted: #888899;
            --border-color: #e0e0e8;
            --hover-glow: rgba(255, 0, 170, 0.15);
            --modal-bg: rgba(244, 244, 248, 0.85);
            --badge-bg: #f0f0f4;
            --badge-text: #666677;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            transition: background 0.4s ease;
            overflow: hidden;
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            width: 100%;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .brand-logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }

        .brand-logo::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary);
        }

        .btn-return {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 16px;
            margin-bottom: 30px;
            background: rgba(255, 0, 85, 0.05);
            color: var(--accent-secondary);
            border: 1px solid rgba(255, 0, 85, 0.3);
            border-radius: 8px;
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .btn-return:hover {
            background: var(--accent-secondary);
            color: var(--bg-main);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        body.light-mode .btn-return {
            background: rgba(0, 195, 255, 0.05);
            border-color: rgba(0, 195, 255, 0.3);
        }

        body.light-mode .btn-return:hover {
            background: var(--accent-secondary);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 195, 255, 0.4);
        }

        .nav-section-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .nav-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            color: var(--text-main);
            background: var(--hover-glow);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: var(--bg-card);
            color: var(--accent-primary);
            border-color: var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .toolbar {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid var(--border-color);
        }

        .toolbar-title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .search-bar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 14px;
            width: 250px;
            color: var(--text-main);
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--hover-glow);
            width: 300px;
        }

        .content-area {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
        }

        .sheet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        .file-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .file-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent-primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), 0 0 15px var(--hover-glow);
        }

        .preview-trigger {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            cursor: pointer;
        }

        .record-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }

        .text-cover {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--border-color), var(--bg-sidebar));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid var(--border-color);
            position: relative;
        }

        .text-cover::after {
            content: '';
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border-radius: 50%;
            position: absolute;
            border: 1px solid var(--border-color);
            z-index: 1;
            box-sizing: border-box;
        }

        .disk-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            z-index: 2;
            object-fit: cover;
        }

        .tonearm {
            position: absolute;
            top: 5px;
            right: 0px;
            width: 6px;
            height: 70px;
            background: var(--text-muted);
            border-radius: 3px;
            transform-origin: 3px 8px;
            transform: rotate(-30deg);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
            opacity: 0;
            z-index: 5;
            pointer-events: none;
        }
        
        .tonearm::before {
            content: '';
            position: absolute;
            top: 0;
            left: -5px;
            width: 16px;
            height: 16px;
            background: var(--bg-card);
            border: 2px solid var(--accent-primary);
            border-radius: 50%;
            box-sizing: border-box;
        }
        
        .tonearm::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -4px;
            width: 14px;
            height: 20px;
            background: var(--accent-secondary);
            border-radius: 3px;
            transform: rotate(15deg);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .file-item.is-playing .text-cover {
            animation: spin 4s linear infinite;
        }

        .file-item.is-playing.is-paused .text-cover {
            animation-play-state: paused;
        }

        .file-item.is-playing .tonearm {
            opacity: 1;
            transform: rotate(25deg);
        }
        
        .file-item.is-playing.is-paused .tonearm {
            transform: rotate(-10deg);
        }

        .file-title {
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-listen {
            background: transparent;
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 0;
            border-radius: 6px;
            width: 100%;
            text-align: center;
            margin-bottom: 12px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .btn-listen:hover {
            background: var(--accent-primary);
            color: var(--bg-main);
            box-shadow: 0 0 15px var(--accent-primary);
        }

        .download-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .dl-badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            font-size: 11px;
            padding: 6px 10px;
            border-radius: 4px;
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s;
        }

        .dl-badge:hover {
            background: var(--text-main);
            color: var(--bg-main);
        }

        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--modal-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .preview-window {
            width: 90vw;
            height: 90vh;
            max-width: 1200px;
            background: var(--bg-main);
            border: 1px solid var(--accent-secondary);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .preview-window {
            transform: translateY(0);
        }

        .preview-toolbar {
            height: 60px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .preview-title {
            font-weight: 600;
            font-size: 16px;
            color: var(--accent-primary);
            font-family: 'JetBrains Mono', monospace;
        }

        .close-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-btn:hover {
            color: var(--accent-secondary);
            border-color: var(--accent-secondary);
        }

        .preview-content {
            flex: 1;
            background: #111;
        }

        #pdf-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .no-preview-msg {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .global-player {
            height: 90px;
            background: var(--bg-sidebar);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 40px;
            gap: 40px;
            z-index: 20;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 250px;
        }

        .player-status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            box-shadow: 0 0 10px transparent;
            transition: all 0.3s ease;
        }

        .player-status-indicator.active {
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary);
        }

        .player-details {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .player-title-display {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .player-time-display {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .ctrl-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100px;
            text-align: center;
        }

        .ctrl-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .progress-container {
            display: flex;
            align-items: center;
            width: 300px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: var(--accent-primary);
            cursor: pointer;
            margin-top: -4px;
            box-shadow: 0 0 10px var(--hover-glow);
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--border-color);
            border-radius: 2px;
        }

        .visualizer-container {
            flex: 1;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #audio-canvas {
            width: 100%;
            height: 100%;
            max-width: 400px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            width: 150px;
        }

    </style>
</head>
<body>

    <div class="app-body">
        <div class="sidebar">
            <div class="brand-logo">LIVE00WIRE // MUSIC</div>

            <a href="/index" class="btn-return">
                RETURN // TERMINAL
            </a>

            <div class="nav-section-title">Library</div>
            <div class="nav-item active" data-filter="all">
                All Databanks
            </div>
            <div class="nav-item" data-filter="sheet-music">
                Sheet Music
            </div>
            <div class="nav-item" data-filter="audio-tracks">
                Audio Tracks
            </div>
            
            <div style="flex-grow: 1;"></div>
            
            <div class="nav-section-title">Protocol</div>
            <div class="nav-item theme-btn active" id="btn-dark-mode">
                Dark Protocol
            </div>
            <div class="nav-item theme-btn" id="btn-light-mode">
                I Hate My Eyes
            </div>
        </div>

        <div class="main-view">
            <div class="toolbar">
                <div class="toolbar-title">All Databanks</div>
                <input type="text" class="search-bar" placeholder="Query files...">
            </div>

            <div class="content-area">
                <div class="sheet-grid" id="music-grid">
                    <div class="file-item" data-category="sheet-music" data-basename="thirty-ninety" data-title="Thirty Ninety" data-audio="yes" data-downloads="pdf,mscz,mid"></div>
                    <div class="file-item" data-category="sheet-music" data-basename="great-balls-of-fire" data-title="Great Balls of Fire" data-audio="yes" data-downloads="pdf,mscz,mid"></div>
                    <div class="file-item" data-category="sheet-music" data-basename="i-dreamed-a-dream" data-title="I Dreamed A Dream" data-audio="yes" data-downloads="pdf,mscz,mid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="global-player">
        <div class="player-info">
            <div class="player-status-indicator" id="status-dot"></div>
            <div class="player-details">
                <div class="player-title-display" id="global-title">SYSTEM IDLE</div>
                <div class="player-time-display"><span id="time-current">00:00</span> // <span id="time-total">00:00</span></div>
            </div>
        </div>

        <div class="player-controls">
            <button class="ctrl-btn" id="play-pause-btn">[ PLAY ]</button>
            <div class="progress-container">
                <input type="range" id="seek-bar" value="0" min="0" max="100" step="0.1">
            </div>
        </div>

        <div class="visualizer-container">
            <canvas id="audio-canvas"></canvas>
        </div>

        <div class="volume-control">
            VOL:
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
        </div>
    </div>

    <div class="modal-overlay" id="quick-look-modal">
        <div class="preview-window">
            <div class="preview-toolbar">
                <div class="preview-title" id="preview-title">Document Name</div>
                <button class="close-btn" id="close-modal-btn">TERMINATE</button>
            </div>
            <div class="preview-content" id="preview-content"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnDark = document.getElementById('btn-dark-mode');
            const btnLight = document.getElementById('btn-light-mode');
            
            btnDark.addEventListener('click', () => {
                document.body.classList.remove('light-mode');
                btnDark.classList.add('active');
                btnLight.classList.remove('active');
            });

            btnLight.addEventListener('click', () => {
                document.body.classList.add('light-mode');
                btnLight.classList.add('active');
                btnDark.classList.remove('active');
            });

            const fileItems = document.querySelectorAll('.file-item');
            
            fileItems.forEach(item => {
                const basename = item.getAttribute('data-basename');
                const title = item.getAttribute('data-title');
                const hasAudio = item.getAttribute('data-audio') === 'yes';
                const downloadsRaw = item.getAttribute('data-downloads') || '';
                const downloads = downloadsRaw.split(',').filter(d => d.trim() !== '');

                let html = `
                    <div class="preview-trigger" onclick="openPreview('${title}', '${basename}', '${downloadsRaw}')">
                        <div class="record-wrapper">
                            <div class="text-cover">
                                <img src="music/${basename}/icon.png" class="disk-icon" alt="icon">
                            </div>
                            <div class="tonearm"></div>
                        </div>
                        <div class="file-title" title="${title}">${title}</div>
                    </div>
                `;

                if (hasAudio) {
                    html += `<button onclick="initPlayback(event, '${title}', '${basename}')" class="btn-listen">Initialize Audio</button>`;
                }

                if (downloads.length > 0) {
                    html += `<div class="download-group">`;
                    downloads.forEach(ext => {
                        html += `<a href="music/${basename}/${basename}.${ext.trim()}" download class="dl-badge">.${ext.trim().toUpperCase()}</a>`;
                    });
                    html += `</div>`;
                }
                item.innerHTML = html;
            });

            const modal = document.getElementById('quick-look-modal');
            const modalTitle = document.getElementById('preview-title');
            const modalContent = document.getElementById('preview-content');
            const closeModalBtn = document.getElementById('close-modal-btn');

            window.openPreview = function(title, basename, downloadsRaw) {
                const downloads = downloadsRaw.split(',');
                modalTitle.textContent = `> ${title}.pdf`;
                
                if (downloads.includes('pdf')) {
                    modalContent.innerHTML = `<iframe id="pdf-frame" src="music/${basename}/${basename}.pdf"></iframe>`;
                } else {
                    modalContent.innerHTML = `
                        <div class="no-preview-msg">
                            <h2>[ ERROR: NO VISUAL DATA FOUND ]</h2>
                            <p>This databank contains audio exclusively.</p>
                        </div>
                    `;
                }
                modal.classList.add('active');
            }

            function closePreview() {
                modal.classList.remove('active');
                setTimeout(() => { modalContent.innerHTML = ''; }, 300); 
            }

            closeModalBtn.addEventListener('click', closePreview);
            modal.addEventListener('click', (e) => { if (e.target === modal) closePreview(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('active')) closePreview(); });

            const navItems = document.querySelectorAll('.nav-item:not(.theme-btn)'); 
            const toolbarTitle = document.querySelector('.toolbar-title');
            const searchBar = document.querySelector('.search-bar');

            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    navItems.forEach(nav => nav.classList.remove('active'));
                    item.classList.add('active');
                    toolbarTitle.textContent = item.textContent.trim();
                    searchBar.value = '';
                    const filter = item.getAttribute('data-filter');
                    
                    document.querySelectorAll('.file-item').forEach(file => {
                        const category = file.getAttribute('data-category');
                        file.style.display = (filter === 'all' || filter === category) ? 'flex' : 'none';
                    });
                });
            });

            searchBar.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                navItems.forEach(nav => nav.classList.remove('active'));
                document.querySelector('[data-filter="all"]').classList.add('active');
                toolbarTitle.textContent = searchTerm === '' ? 'All Databanks' : `Query Results: ${searchTerm}`;

                document.querySelectorAll('.file-item').forEach(file => {
                    const title = file.getAttribute('data-title').toLowerCase();
                    file.style.display = title.includes(searchTerm) ? 'flex' : 'none';
                });
            });

            const audioElement = new Audio();
            audioElement.crossOrigin = "anonymous";
            
            let audioContext;
            let analyser;
            let dataArray;
            let isDragging = false;
            let currentPlayingBasename = null; 
            
            const playPauseBtn = document.getElementById('play-pause-btn');
            const seekBar = document.getElementById('seek-bar');
            const volumeSlider = document.getElementById('volume-slider');
            const timeCurrent = document.getElementById('time-current');
            const timeTotal = document.getElementById('time-total');
            const globalTitle = document.getElementById('global-title');
            const statusDot = document.getElementById('status-dot');
            const canvas = document.getElementById('audio-canvas');
            const canvasCtx = canvas.getContext('2d');

            function formatTime(seconds) {
                if (isNaN(seconds)) return "00:00";
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            function setupWebAudio() {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    const source = audioContext.createMediaElementSource(audioElement);
                    source.connect(analyser);
                    analyser.connect(audioContext.destination);
                    analyser.fftSize = 128;
                    const bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);
                    drawVisualizer();
                }
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
            }

            function drawVisualizer() {
                requestAnimationFrame(drawVisualizer);
                
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                
                analyser.getByteFrequencyData(dataArray);
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                
                const barWidth = (canvas.width / dataArray.length) * 1.5;
                let barHeight;
                let x = 0;
                
                const computedStyle = getComputedStyle(document.body);
                const accentColor = computedStyle.getPropertyValue('--accent-primary').trim();

                for(let i = 0; i < dataArray.length; i++) {
                    barHeight = (dataArray[i] / 255) * canvas.height;
                    canvasCtx.fillStyle = accentColor;
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 2;
                }
            }

            window.initPlayback = function(e, title, basename) {
                e.stopPropagation();
                setupWebAudio();
                
                audioElement.src = `music/${basename}/${basename}.mp3`;
                audioElement.play();
                
                globalTitle.textContent = title;
                playPauseBtn.textContent = "[ PAUSE ]";
                statusDot.classList.add('active');

                currentPlayingBasename = basename;
                document.querySelectorAll('.file-item').forEach(item => {
                    item.classList.remove('is-playing', 'is-paused');
                });
                const activeCard = document.querySelector(`.file-item[data-basename="${basename}"]`);
                if (activeCard) activeCard.classList.add('is-playing');
            };

            playPauseBtn.addEventListener('click', () => {
                if (!audioElement.src) return;
                
                const activeCard = document.querySelector(`.file-item[data-basename="${currentPlayingBasename}"]`);

                if (audioElement.paused) {
                    audioElement.play();
                    playPauseBtn.textContent = "[ PAUSE ]";
                    statusDot.classList.add('active');
                    if (activeCard) activeCard.classList.remove('is-paused'); 
                } else {
                    audioElement.pause();
                    playPauseBtn.textContent = "[ PLAY ]";
                    statusDot.classList.remove('active');
                    if (activeCard) activeCard.classList.add('is-paused'); 
                }
            });

            audioElement.addEventListener('timeupdate', () => {
                if (!isDragging) {
                    const progress = (audioElement.currentTime / audioElement.duration) * 100 || 0;
                    seekBar.value = progress;
                }
                timeCurrent.textContent = formatTime(audioElement.currentTime);
            });

            audioElement.addEventListener('loadedmetadata', () => {
                timeTotal.textContent = formatTime(audioElement.duration);
            });

            audioElement.addEventListener('ended', () => {
                playPauseBtn.textContent = "[ PLAY ]";
                statusDot.classList.remove('active');
                seekBar.value = 0;
                timeCurrent.textContent = "00:00";
                
                const activeCard = document.querySelector(`.file-item[data-basename="${currentPlayingBasename}"]`);
                if (activeCard) activeCard.classList.remove('is-playing', 'is-paused');
            });

            seekBar.addEventListener('input', () => {
                isDragging = true;
                if (audioElement.duration) {
                    timeCurrent.textContent = formatTime((seekBar.value / 100) * audioElement.duration);
                }
            });

            seekBar.addEventListener('change', () => {
                isDragging = false;
                if (audioElement.duration) {
                    audioElement.currentTime = (seekBar.value / 100) * audioElement.duration;
                }
            });

            volumeSlider.addEventListener('input', (e) => {
                audioElement.volume = e.target.value;
            });
            
            audioElement.volume = volumeSlider.value;
        });
    </script>
</body>
</html>
