<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>>L Sprite Studio</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --border-color: #3c3c3c;
            --text-main: #d4d4d4;
            --text-dim: #858585;
            --syntax-blue: #569cd6;
            --syntax-orange: #ce9178;
            --syntax-green: #b5cea8;
            --syntax-purple: #c586c0;
            --btn-active: #007acc;
        }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex; flex-direction: column;
            overflow: hidden; user-select: none;
        }

        .studio-layout {
            flex-grow: 1;
            display: flex;
            border-top: 1px solid var(--border-color);
        }

        .sidebar {
            width: 260px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            padding: 15px; box-sizing: border-box;
            gap: 20px;
            overflow-y: auto;
        }

        .panel-header {
            font-size: 12px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 10px; display: flex; justify-content: space-between;
        }

        .tools-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
        }
        .tools-grid-3 {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
        }
        .tool-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px; border-radius: 4px;
            cursor: pointer; text-align: center;
            font-size: 16px; transition: background 0.2s;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.1); }
        .tool-btn.active { 
            background: var(--btn-active); 
            border-color: transparent; 
            box-shadow: 0 0 10px rgba(0, 122, 204, 0.5);
        }

        .io-btn {
            font-size: 13px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .io-btn:hover { background: rgba(255,255,255,0.15); color: white; }
        .export-btn {
            grid-column: span 2; 
        }

        select.tool-btn {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            outline: none;
            font-family: inherit;
        }
        select.tool-btn:focus { border-color: var(--syntax-blue); }

        input[type=range] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 100%; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            height: 16px; width: 16px; border-radius: 50%;
            background: var(--syntax-blue); cursor: pointer; margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: var(--border-color);
            border-radius: 2px;
        }
        input[type=range]:focus { outline: none; }

        .color-picker-row {
            display: flex; gap: 8px; align-items: center; margin-bottom: 15px;
        }
        #color-wheel {
            width: 40px; height: 32px; border: 1px solid var(--border-color);
            border-radius: 4px; cursor: pointer; padding: 0; background: var(--bg-panel);
        }
        #color-wheel::-webkit-color-swatch-wrapper { padding: 2px; }
        #color-wheel::-webkit-color-swatch { border: 1px solid var(--border-color); border-radius: 2px; }
        
        #hex-input {
            flex-grow: 1; height: 32px; background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color); border-radius: 4px;
            color: var(--syntax-green); font-family: monospace; font-size: 14px;
            padding: 0 8px; box-sizing: border-box; outline: none; text-transform: uppercase;
        }
        #hex-input:focus { border-color: var(--syntax-blue); }

        .palette-grid {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px;
        }
        .color-swatch {
            aspect-ratio: 1; border-radius: 4px;
            cursor: pointer; border: 2px solid transparent;
            box-sizing: border-box;
        }
        .color-swatch.active {
            border-color: white;
            box-shadow: 0 0 8px rgba(255,255,255,0.6);
        }
        .recent-empty {
            background: rgba(255,255,255,0.02);
            border: 1px dashed rgba(255,255,255,0.1);
            cursor: default;
        }

        /* --- Main Canvas Area --- */
        .canvas-container {
            flex-grow: 1;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-dark);
            padding: 40px; overflow: auto;
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        #paint-canvas {
            background-color: var(--bg-dark);
            background-image:
                linear-gradient(45deg, #2d2d2d 25%, transparent 25%),
                linear-gradient(-45deg, #2d2d2d 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #2d2d2d 75%),
                linear-gradient(-45deg, transparent 75%, #2d2d2d 75%);
            background-size: 32px 32px; 
            background-position: 0 0, 0 16px, 16px 16px, 16px 0;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            cursor: crosshair;
            image-rendering: pixelated; 
        }

    </style>
</head>
<body>

    <div class="studio-layout">
        
        <aside class="sidebar">
            
            <section>
                <div class="panel-header">File_I/O</div>
                <div class="tools-grid">
                    <button class="tool-btn io-btn" onclick="saveSprite()" style="color: var(--syntax-green);" title="Save Project (.ldevsprite)">💾 Save</button>
                    <button class="tool-btn io-btn" onclick="document.getElementById('file-upload').click()" style="color: var(--syntax-orange);" title="Load Project (.ldevsprite)">📂 Load</button>
                    <button class="tool-btn io-btn export-btn" onclick="exportPNG()" style="color: var(--syntax-purple);" title="Export to PNG">🖼️ Export PNG</button>
                    <input type="file" id="file-upload" accept=".ldevsprite" style="display: none;" onchange="loadSprite(event)">
                </div>
            </section>

            <section>
                <div class="panel-header">Canvas_Settings</div>
                <div class="tools-grid">
                    <select id="grid-size-select" class="tool-btn" style="grid-column: span 2; width: 100%; text-align: center; color: var(--syntax-blue);" onchange="handleSizeChange(event)">
                        <option value="16">16 x 16 (Retro)</option>
                        <option value="32" selected>32 x 32 (Standard)</option>
                        <option value="64">64 x 64 (Hi-Res)</option>
                    </select>
                </div>
            </section>

            <section>
                <div class="panel-header">History</div>
                <div class="tools-grid">
                    <button class="tool-btn action-btn" data-action="undo" title="Undo (Ctrl+Z)" style="color: var(--text-dim);">↶ Undo</button>
                    <button class="tool-btn action-btn" data-action="redo" title="Redo (Ctrl+Y)" style="color: var(--text-dim);">↷ Redo</button>
                </div>
            </section>

            <section>
                <div class="panel-header">Execution_Tools</div>
                <div class="tools-grid-3">
                    <button class="tool-btn active draw-tool-btn" data-tool="pencil" title="Pencil (P)">✎</button>
                    <button class="tool-btn draw-tool-btn" data-tool="eraser" title="Eraser (E)">💧</button>
                    <button class="tool-btn draw-tool-btn" data-tool="fill" title="Fill Bucket (F)">🌅</button>
                </div>
                <button class="tool-btn action-btn" data-action="clear" title="Clear Canvas" style="width: 100%; margin-top: 8px;">🗑 Clear Canvas</button>
            </section>

            <section>
                <div class="panel-header">
                    Brush_Size 
                    <span id="brush-size-label" style="color: var(--syntax-blue);">1px</span>
                </div>
                <div style="padding: 0 5px;">
                    <input type="range" id="brush-size" min="1" max="10" value="1">
                </div>
            </section>

            <section>
                <div class="panel-header">Custom_Color</div>
                <div class="color-picker-row">
                    <input type="color" id="color-wheel" value="#000000" title="Open Color Wheel">
                    <input type="text" id="hex-input" value="#000000" maxlength="7" title="Hex Code">
                </div>

                <div class="panel-header">Recently_Used</div>
                <div class="palette-grid" id="recent-palette" style="margin-bottom: 15px;">
                    </div>

                <div class="panel-header">Presets</div>
                <div class="palette-grid" id="palette">
                    <div class="color-swatch active" style="background: #000000;" data-color="#000000"></div>
                    <div class="color-swatch" style="background: #1D2B53;" data-color="#1D2B53"></div>
                    <div class="color-swatch" style="background: #7E2553;" data-color="#7E2553"></div>
                    <div class="color-swatch" style="background: #008751;" data-color="#008751"></div>
                    <div class="color-swatch" style="background: #AB5236;" data-color="#AB5236"></div>
                    <div class="color-swatch" style="background: #5F574F;" data-color="#5F574F"></div>
                    <div class="color-swatch" style="background: #C2C3C7;" data-color="#C2C3C7"></div>
                    <div class="color-swatch" style="background: #FFF1E8;" data-color="#FFF1E8"></div>
                    <div class="color-swatch" style="background: #FF004D;" data-color="#FF004D"></div>
                    <div class="color-swatch" style="background: #FFA300;" data-color="#FFA300"></div>
                    <div class="color-swatch" style="background: #FFEC27;" data-color="#FFEC27"></div>
                    <div class="color-swatch" style="background: #00E436;" data-color="#00E436"></div>
                    <div class="color-swatch" style="background: #29ADFF;" data-color="#29ADFF"></div>
                    <div class="color-swatch" style="background: #83769C;" data-color="#83769C"></div>
                    <div class="color-swatch" style="background: #FF77A8;" data-color="#FF77A8"></div>
                    <div class="color-swatch" style="background: #FFCCAA;" data-color="#FFCCAA"></div>
                </div>
            </section>

        </aside>

        <main class="canvas-container">
            <canvas id="paint-canvas" width="32" height="32" style="width: 512px; height: 512px;"></canvas>
        </main>

    </div>

    <script>
        let currentTool = 'pencil';
        let currentColor = '#000000';
        let isDrawing = false;
        let recentColors = [];
        let brushSize = 1;
        let GRID_SIZE = 32;

        let historyStack = [];
        let historyIndex = -1;
        const MAX_HISTORY = 50;

        const mainCanvas = document.getElementById('paint-canvas');
        const ctx = mainCanvas.getContext('2d', { willReadFrequently: true });

        const drawToolBtns = document.querySelectorAll('.draw-tool-btn');
        const actionBtns = document.querySelectorAll('.action-btn');
        const colorWheel = document.getElementById('color-wheel');
        const hexInput = document.getElementById('hex-input');
        const recentPalette = document.getElementById('recent-palette');
        const presetPalette = document.getElementById('palette');
        const gridSizeSelect = document.getElementById('grid-size-select');
        const brushSizeSlider = document.getElementById('brush-size');
        const brushSizeLabel = document.getElementById('brush-size-label');

        function pushState() {
            historyIndex++;
            historyStack.length = historyIndex;
            historyStack.push(ctx.getImageData(0, 0, GRID_SIZE, GRID_SIZE));

            if (historyStack.length > MAX_HISTORY) {
                historyStack.shift();
                historyIndex--;
            }
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                ctx.putImageData(historyStack[historyIndex], 0, 0);
            }
        }

        function redo() {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++;
                ctx.putImageData(historyStack[historyIndex], 0, 0);
            }
        }

        function resetHistory() {
            historyStack = [];
            historyIndex = -1;
            pushState(); 
        }

        brushSizeSlider.addEventListener('input', (e) => {
            brushSize = parseInt(e.target.value);
            brushSizeLabel.innerText = brushSize + 'px';
        });

        function setCanvasSize(size, bypassWarning = false) {
            if (!bypassWarning && !confirm("Changing canvas size will clear your current sprite. Continue?")) {
                gridSizeSelect.value = GRID_SIZE; 
                return;
            }
            
            GRID_SIZE = parseInt(size);
            gridSizeSelect.value = GRID_SIZE; 

            mainCanvas.width = GRID_SIZE;
            mainCanvas.height = GRID_SIZE;

            const pxSize = 512 / GRID_SIZE;
            const checkerSize = pxSize * 2;
            mainCanvas.style.backgroundSize = `${checkerSize}px ${checkerSize}px`;
            mainCanvas.style.backgroundPosition = `0 0, 0 ${pxSize}px, ${pxSize}px ${pxSize}px, ${pxSize}px 0`;

            ctx.clearRect(0, 0, GRID_SIZE, GRID_SIZE);
            resetHistory(); 
        }

        function handleSizeChange(e) {
            setCanvasSize(e.target.value);
        }

        function updateActiveSwatches() {
            document.querySelectorAll('.color-swatch').forEach(s => {
                if (s.dataset.color && s.dataset.color.toUpperCase() === currentColor.toUpperCase()) {
                    s.classList.add('active');
                } else {
                    s.classList.remove('active');
                }
            });
        }

        function setColor(hex) {
            currentColor = hex.toUpperCase();
            colorWheel.value = currentColor;
            hexInput.value = currentColor;
            updateActiveSwatches();
            
            if (currentTool === 'eraser') setTool('pencil'); 
        }

        function addRecentColor(hex) {
            hex = hex.toUpperCase();
            recentColors = recentColors.filter(c => c !== hex);
            recentColors.unshift(hex);
            if (recentColors.length > 6) recentColors.pop();
            renderRecentColors();
        }

        function renderRecentColors() {
            recentPalette.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                if (i < recentColors.length) {
                    const hex = recentColors[i];
                    const isActive = (currentColor === hex) ? 'active' : '';
                    recentPalette.innerHTML += `<div class="color-swatch ${isActive}" style="background: ${hex};" data-color="${hex}"></div>`;
                } else {
                    recentPalette.innerHTML += `<div class="color-swatch recent-empty"></div>`;
                }
            }
        }

        colorWheel.addEventListener('input', (e) => {
            setColor(e.target.value);
        });
        
        colorWheel.addEventListener('change', (e) => {
            addRecentColor(e.target.value);
        });

        hexInput.addEventListener('change', (e) => {
            let val = e.target.value.trim();
            if (!val.startsWith('#')) val = '#' + val;
            
            if (/^#[0-9A-F]{6}$/i.test(val)) {
                setColor(val);
                addRecentColor(val);
            } else {
                hexInput.value = currentColor; 
            }
        });

        function handleSwatchClick(e) {
            const swatch = e.target.closest('.color-swatch');
            if (!swatch || !swatch.dataset.color) return;
            
            setColor(swatch.dataset.color);
            addRecentColor(swatch.dataset.color);
        }
        presetPalette.addEventListener('click', handleSwatchClick);
        recentPalette.addEventListener('click', handleSwatchClick);

        renderRecentColors();

        function setTool(toolName) {
            currentTool = toolName;
            drawToolBtns.forEach(b => {
                if(b.dataset.tool === toolName) b.classList.add('active');
                else b.classList.remove('active');
            });
        }

        function triggerAction(actionName) {
            if(actionName === 'clear') {
                ctx.clearRect(0, 0, GRID_SIZE, GRID_SIZE);
                pushState();
            } else if (actionName === 'undo') {
                undo();
            } else if (actionName === 'redo') {
                redo();
            }
        }

        drawToolBtns.forEach(btn => {
            btn.addEventListener('click', () => setTool(btn.dataset.tool));
        });

        actionBtns.forEach(btn => {
            btn.addEventListener('click', () => triggerAction(btn.dataset.action));
        });

        document.addEventListener('keydown', (e) => {
            if (document.activeElement === hexInput) return;

            if (e.ctrlKey || e.metaKey) {
                if (e.key.toLowerCase() === 'z') {
                    if (e.shiftKey) redo();
                    else undo();
                    e.preventDefault();
                    return;
                }
                if (e.key.toLowerCase() === 'y') {
                    redo();
                    e.preventDefault();
                    return;
                }
            }

            if(e.key.toLowerCase() === 'p') setTool('pencil');
            if(e.key.toLowerCase() === 'e') setTool('eraser');
            if(e.key.toLowerCase() === 'f') setTool('fill');
        });

        function getGridCoordinates(e) {
            const rect = mainCanvas.getBoundingClientRect();
            const scaleX = mainCanvas.width / rect.width;
            const scaleY = mainCanvas.height / rect.height;
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);
            return { x, y };
        }

        function applyTool(x, y) {
            if (currentTool === 'fill') {
                if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                    floodFill(x, y, currentColor);
                }
                return;
            }

            const offsetStart = -Math.floor(brushSize / 2);
            const offsetEnd = Math.floor((brushSize - 1) / 2);

            for (let ix = offsetStart; ix <= offsetEnd; ix++) {
                for (let iy = offsetStart; iy <= offsetEnd; iy++) {
                    const px = x + ix;
                    const py = y + iy;

                    if (px >= 0 && px < GRID_SIZE && py >= 0 && py < GRID_SIZE) {
                        if (currentTool === 'pencil') {
                            ctx.fillStyle = currentColor;
                            ctx.fillRect(px, py, 1, 1);
                        } else if (currentTool === 'eraser') {
                            ctx.clearRect(px, py, 1, 1);
                        }
                    }
                }
            }
        }

        mainCanvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const { x, y } = getGridCoordinates(e);
            applyTool(x, y);
        });

        mainCanvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            if (currentTool === 'fill') return; 
            
            const { x, y } = getGridCoordinates(e);
            applyTool(x, y);
        });

        mainCanvas.addEventListener('mouseup', () => {
            if (isDrawing) {
                isDrawing = false;
                pushState(); 
            }
        });
        
        mainCanvas.addEventListener('mouseleave', () => {
            if (isDrawing) {
                isDrawing = false;
                pushState(); 
            }
        });

        function hexToRgba(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return [r, g, b, 255];
        }

        function floodFill(startX, startY, fillColorHex) {
            const imgData = ctx.getImageData(0, 0, GRID_SIZE, GRID_SIZE);
            const data = imgData.data;
            const fillRgba = hexToRgba(fillColorHex);

            const startPos = (startY * GRID_SIZE + startX) * 4;
            const startR = data[startPos];
            const startG = data[startPos + 1];
            const startB = data[startPos + 2];
            const startA = data[startPos + 3];

            if (startR === fillRgba[0] && startG === fillRgba[1] && startB === fillRgba[2] && startA === fillRgba[3]) return;

            function matchStartColor(x, y) {
                if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return false;
                const pos = (y * GRID_SIZE + x) * 4;
                return data[pos] === startR && data[pos+1] === startG && data[pos+2] === startB && data[pos+3] === startA;
            }

            const stack = [[startX, startY]];
            
            while (stack.length > 0) {
                const [x, y] = stack.pop();
                const pos = (y * GRID_SIZE + x) * 4;

                data[pos] = fillRgba[0];
                data[pos+1] = fillRgba[1];
                data[pos+2] = fillRgba[2];
                data[pos+3] = fillRgba[3];

                if (matchStartColor(x + 1, y)) stack.push([x + 1, y]);
                if (matchStartColor(x - 1, y)) stack.push([x - 1, y]);
                if (matchStartColor(x, y + 1)) stack.push([x, y + 1]);
                if (matchStartColor(x, y - 1)) stack.push([x, y - 1]);
            }

            ctx.putImageData(imgData, 0, 0);
            pushState(); 
        }

        function saveSprite() {
            const imgData = ctx.getImageData(0, 0, GRID_SIZE, GRID_SIZE).data;
            const pixels = [];
            
            for(let i = 0; i < imgData.length; i += 4) {
                const r = imgData[i], g = imgData[i+1], b = imgData[i+2], a = imgData[i+3];
                if(a === 0) {
                    pixels.push(null);
                } else {
                    const hex = "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
                    pixels.push(hex);
                }
            }

            const payload = {
                format: ">L_SPRITE_DATA",
                version: "1.0",
                grid_size: GRID_SIZE,
                timestamp: new Date().toISOString(),
                pixels: pixels
            };

            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `project_${Date.now()}.ldevsprite`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function loadSprite(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if(data.format !== ">L_SPRITE_DATA" || !data.grid_size) {
                        alert("Error: Invalid or corrupted .ldevsprite file.");
                        return;
                    }

                    setCanvasSize(data.grid_size, true);

                    const pixels = data.pixels;
                    
                    for(let i = 0; i < pixels.length; i++) {
                        if(pixels[i] !== null) {
                            const x = i % GRID_SIZE;
                            const y = Math.floor(i / GRID_SIZE);
                            ctx.fillStyle = pixels[i];
                            ctx.fillRect(x, y, 1, 1);
                        }
                    }
                    pushState();

                } catch(err) {
                    alert("Error: Failed to parse .ldevsprite file.");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        function exportPNG() {
            const dataURL = mainCanvas.toDataURL("image/png");
            const a = document.createElement('a');
            a.href = dataURL;
            a.download = `sprite_${Date.now()}.png`;
            a.click();
        }

        resetHistory();

    </script>
</body>
</html>
