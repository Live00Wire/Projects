                updateClipEditor();
            }
        });

        arrCanvas.addEventListener('dblclick', (e) => {
            const p = getArrangerPos(e);
            if (p.rawY < 35) return;

            const sx = Math.floor(p.x / arrStepWidth);
            const tk = Math.floor(p.y / TRACK_HEIGHT);

            if (tk >= 0 && tk < tracks.length && !timelineClips.find(cl => cl.track === tk && sx >= cl.startStep && sx <= cl.startStep + cl.duration)) {
                let nc = {
                    id: Math.random().toString(),
                    track: tk,
                    startStep: sx,
                    duration: 16,
                    notes: [],
                    color: tracks[tk].color
                };
                timelineClips.push(nc);
                selectedClip = nc;
                updateClipEditor();
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isDrawingCycle || selectedClip) {
                const p = getArrangerPos(e);
                const sx = Math.floor(p.x / arrStepWidth);

                if (isDrawingCycle) {
                    cycleStart = Math.min(cycleClickOrigin, sx);
                    cycleEnd = Math.max(cycleClickOrigin, sx) + 1;
                } else if (selectedClip) {
                    if (isResizingRight) {
                        selectedClip.duration = Math.max(1, sx - selectedClip.startStep);
                        updateClipEditor();
                    } else if (isDraggingClip) {
                        selectedClip.startStep = Math.max(0, sx - clipDragOffset);
                        const tk = Math.floor(p.y / TRACK_HEIGHT);
                        if (tk >= 0 && tk < tracks.length) {
                            selectedClip.track = tk;
                            selectedClip.color = tracks[tk].color;
                            updateClipEditor();
                        }
                    }
                }
            }
        });

        window.addEventListener('mouseup', () => {
            isDraggingClip = false;
            isResizingRight = false;
            isDrawingCycle = false;
        });

        window.addEventListener('keydown', (e) => {
            if (!selectedClip && lastFocusedArea === 'pianoroll') return;

            if (e.key === 'Backspace' || e.key === 'Delete') {
                if (lastFocusedArea === 'pianoroll') {
                    const an = selectedClip.notes.filter(n => n.selected);
                    if (an.length > 0) {
                        selectedClip.notes = selectedClip.notes.filter(n => !n.selected);
                    }
                    updateClipEditor();
                } else {
                    timelineClips = timelineClips.filter(c => c.id !== selectedClip.id);
                    selectedClip = null;
                    updateClipEditor();
                }
            }

            if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
                if (lastFocusedArea === 'pianoroll') {
                    const an = selectedClip.notes.filter(n => n.selected);
                    if (an.length > 0) {
                        noteClipboard = JSON.parse(JSON.stringify(an));
                    }
                } else {
                    clipClipboard = JSON.parse(JSON.stringify(selectedClip));
                }
            }

            if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
                if (lastFocusedArea === 'pianoroll' && noteClipboard.length > 0) {
                    const ms = Math.min(...noteClipboard.map(n => n.startOffset));
                    const lp = (globalStep >= selectedClip.startStep && globalStep < selectedClip.startStep + selectedClip.duration) ? globalStep - selectedClip.startStep : 0;
                    const od = lp - ms;

                    selectedClip.notes.forEach(n => n.selected = false);

                    noteClipboard.forEach(n => {
                        selectedClip.notes.push({
                            id: Math.random().toString(),
                            inst: n.inst,
                            startOffset: Math.max(0, n.startOffset + od),
                            duration: n.duration,
                            selected: true
                        });
                    });
                    updateClipEditor();
                } else if (lastFocusedArea === 'arranger' && clipClipboard) {
                    let nc = JSON.parse(JSON.stringify(clipClipboard));
                    nc.id = Math.random().toString();
                    nc.startStep = globalStep;
                    timelineClips.push(nc);
                    selectedClip = nc;
                    updateClipEditor();
                }
            }
        });

        document.querySelectorAll('.window').forEach(win => {
            makeDraggable(win, win.querySelector('.header'));
            win.querySelector('.win-title').onclick = () => win.classList.toggle('collapsed');
        });

        document.getElementById('metronomeBtn').onclick = (e) => {
            isMetronomeOn = !isMetronomeOn;
            e.target.classList.toggle('active');
            e.target.style.color = isMetronomeOn ? 'var(--neon-cyan)' : 'var(--text-dim)';
            e.target.style.borderColor = isMetronomeOn ? 'var(--neon-cyan)' : 'var(--border-color)';
        };

        function exportWAVData() {
            const len = bounceBufL.reduce((acc, b) => acc + b.length, 0);
            const buffer = new ArrayBuffer(44 + len * 4);
            const view = new DataView(buffer);

            const writeStr = (s, off) => {
                for (let i = 0; i < s.length; i++) {
                    view.setUint8(off + i, s.charCodeAt(i));
                }
            };

            writeStr('RIFF', 0);
            view.setUint32(4, 36 + len * 4, true);
            writeStr('WAVE', 8);
            writeStr('fmt ', 12);
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 2, true);
            view.setUint32(24, audioCtx.sampleRate, true);
            view.setUint32(28, audioCtx.sampleRate * 4, true);
            view.setUint16(32, 4, true);
            view.setUint16(34, 16, true);
            writeStr('data', 36);
            view.setUint32(40, len * 4, true);

            let off = 44;
            for (let i = 0; i < bounceBufL.length; i++) {
                let l = bounceBufL[i];
                let r = bounceBufR[i];
                for (let j = 0; j < l.length; j++) {
                    view.setInt16(off, l[j] < 0 ? l[j] * 0x8000 : l[j] * 0x7FFF, true);
                    off += 2;
                    view.setInt16(off, r[j] < 0 ? r[j] * 0x8000 : r[j] * 0x7FFF, true);
                    off += 2;
                }
            }

            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = URL.createObjectURL(new Blob([view], { type: 'audio/wav' }));
            a.download = `LD-Bounce-${Date.now()}.wav`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => a.remove(), 100);
        }

        function stopPlayback() {
            isPlaying = false;
            document.getElementById('playBtn').classList.remove('active');
            globalStep = isCycleActive ? Math.min(cycleStart, cycleEnd) : 0;
            updateClipEditor();

            if (isBouncing) {
                isBouncing = false;
                document.getElementById('bounceBtn').classList.remove('active');
                document.getElementById('bounceBtn').innerText = 'Bounce to WAV';
                exportWAVData();
            }
        }

        document.getElementById('playBtn').onclick = (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isPlaying = !isPlaying;

            if (isPlaying) {
                nextNoteTime = audioCtx.currentTime;
                scheduler();
                e.target.classList.add('active');
            } else {
                stopPlayback();
            }
        };

        document.getElementById('stopBtn').onclick = stopPlayback;

        document.getElementById('cycleBtn').onclick = (e) => {
            isCycleActive = !isCycleActive;
            e.target.classList.toggle('active');
        };

        document.getElementById('clearTimelineBtn').onclick = () => {
            timelineClips = [];
            selectedClip = null;
            updateClipEditor();
        };

        document.getElementById('bpmInput').oninput = (e) => {
            tempo = e.target.value;
            document.getElementById('bpmVal').innerText = tempo;
            delayNode.delayTime.value = (60.0 / tempo) * parseFloat(document.getElementById('delayTime').value);
        };

        document.getElementById('bounceBtn').onclick = (e) => {
            if (isBouncing) {
                stopPlayback();
                return;
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();

            bounceBufL = [];
            bounceBufR = [];
            isBouncing = true;
            isCycleActive = false;

            document.getElementById('cycleBtn').classList.remove('active');
            globalStep = 0;
            e.target.classList.add('active');
            e.target.innerText = 'Stop & Save';

            if (!isPlaying) {
                isPlaying = true;
                document.getElementById('playBtn').classList.add('active');
                nextNoteTime = audioCtx.currentTime;
                scheduler();
            }
        };

        document.getElementById('exportMidiProjectBtn').onclick = () => exportMidi();

        function getSaveData() {
            const safeTracks = tracks.map(t => ({
                id: t.id,
                name: t.name,
                type: t.type,
                color: t.color,
                wave: t.wave,
                volume: t.volume,
                filterFreq: t.filterFreq,
                pan: t.pan,
                mute: t.mute,
                solo: t.solo
            }));
            return { v: "3.1", tempo, clips: timelineClips, tracks: safeTracks };
        }

        function loadData(d) {
            tempo = d.tempo;
            document.getElementById('bpmInput').value = tempo;
            document.getElementById('bpmVal').innerText = tempo;
            timelineClips = d.clips || [];

            tracks.forEach(t => {
                t.channel.gain.disconnect();
                t.channel.filter.disconnect();
                t.channel.panner.disconnect();
            });
            tracks = [];

            (d.tracks || []).forEach(t => {
                let tr = {
                    ...t,
                    channel: createChannel(),
                    pan: t.pan || 0,
                    mute: t.mute || false,
                    solo: t.solo || false
                };
                tr.channel.filter.frequency.value = tr.filterFreq;
                tr.channel.panner.pan.value = tr.pan;
                tracks.push(tr);
            });

            updateTrackVolumes();
            renderTrackHeaders();
            renderMixer();
            updateClipEditor();
            resizeArranger();
        }

        document.getElementById('saveBtn').onclick = () => {
            const blob = new Blob([JSON.stringify(getSaveData())], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `project-${Date.now()}.LDevStudio`;
            a.click();
        };

        document.getElementById('loadBtn').onclick = () => document.getElementById('fileInput').click();

        document.getElementById('fileInput').onchange = (e) => {
            const f = e.target.files[0];
            if (!f) return;
            const r = new FileReader();
            r.onload = (ev) => loadData(JSON.parse(ev.target.result));
            r.readAsText(f);
        };

        document.getElementById('localSaveBtn').onclick = () => {
            localStorage.setItem('ldev_quick', JSON.stringify(getSaveData()));
            alert("Saved!");
        };

        document.getElementById('localLoadBtn').onclick = () => {
            const d = JSON.parse(localStorage.getItem('ldev_quick'));
            if (d) loadData(d);
        };

        const rObs = [
            new ResizeObserver(() => {
                waveCanvas.width = document.getElementById('canvasWrap').clientWidth;
                waveCanvas.height = document.getElementById('canvasWrap').clientHeight;
            }),
            new ResizeObserver(() => {
                resizeArranger();
            }),
            new ResizeObserver(() => {
                if (selectedClip) updateClipEditor();
            })
        ];

        rObs[0].observe(document.getElementById('canvasWrap'));
        rObs[1].observe(document.getElementById('arrangerWrap'));
        rObs[2].observe(document.getElementById('prCanvasWrap'));

        renderTrackHeaders();
        renderMixer();
        resizeArranger();
    </script>
</body>
</html>
