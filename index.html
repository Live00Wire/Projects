<!DOCTYPE html>
<html lang="en">
<head>
<link rel="shortcut icon" type="image/x-icon" href="favicon-96x96.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live00Wire Dev</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap');
body{ background:#0a0f0a; color:#33ff66; font-family:'Doto', sans-serif; display:flex; justify-content:center; padding:40px; margin:0; }
#terminal{ width:900px; max-width:95%; background:#000; border:2px solid #33ff66; padding:25px; box-shadow:0 0 20px #33ff66; overflow:hidden; position:relative; }
h1{ margin-top:0; font-size: 1.2rem; }
.choice{ display:none; background:black; border:1px solid #33ff66; color:#33ff66; padding:10px; margin-top:5px; text-align:left; cursor:pointer; }
.choice.visible{ display:block; }
.choice:hover{ background:#33ff66; color:black; }
#log{ min-height:200px; white-space:pre; overflow-x: auto; line-height: 1.4; }
#inputLine{ margin-top:10px; }
#choices{ margin-top:5px; }
.cursor{ display:inline-block; width:10px; height:18px; background:#33ff66; margin-left:4px; animation:blink 1s infinite; }
@keyframes blink{ 50%{opacity:0} }
#footer{ margin-top:25px; font-size:12px; opacity:.7; }
#matrixCanvas{ position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events: none; }
#terminalTitle { visibility: hidden; }
#terminalUI { opacity: 0; transition: opacity 1.5s ease-in-out; }
#terminalUI.visible, #terminalTitle.visible { visibility: visible; opacity: 1; }
a{ color:#33ff66; text-decoration:underline; font-weight: bold; }
</style>
</head>
<body>
<div id="terminal">
  <canvas id="matrixCanvas"></canvas>
  <h1 id="terminalTitle">&gt; Live00Wire Dev Terminal</h1>
  <div id="log"></div>
  <div id="terminalUI">
    <div id="inputLine">&gt; <span id="typed"></span><span class="cursor"></span></div>
    <div id="choices"></div>
    <div id="footer">Created by Live00Wire | <a href="https://www.buymeacoffee.com/live00wire" target="_blank">Buy me a coffee</a></div>
  </div>
</div>

<script>
const log = document.getElementById('log');
const choicesDiv = document.getElementById('choices');
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
const startTime = Date.now();

canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
const cols = Math.floor(canvas.width / 20);
const drops = new Array(cols).fill(1);
const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*';

function drawMatrix(){
  ctx.fillStyle='rgba(0,0,0,0.05)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#33ff66';
  ctx.font='18px Doto';
  for(let i=0;i<drops.length;i++){
    const text = chars.charAt(Math.floor(Math.random()*chars.length));
    ctx.fillText(text, i*20, drops[i]*20);
    if(drops[i]*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

let matrixInterval = setInterval(drawMatrix, 50);
setTimeout(()=>{ clearInterval(matrixInterval); ctx.clearRect(0,0,canvas.width,canvas.height); startProgressBars(); },3000);

function startProgressBars(){
  log.innerText='';
  const modules = ['Initializing BIOS','Loading Projects','Establishing Handshake','Ready'];
  let current = 0;
  function nextModule(){
    if(current >= modules.length){ initTerminal(); return; }
    log.innerText += modules[current]+': [                    ]\n';
    let progress = 0;
    const interval = setInterval(()=>{
      progress++;
      const filled='█'.repeat(progress);
      const empty=' '.repeat(20-progress);
      const lines = log.innerText.split('\n');
      lines[lines.length - 2] = modules[current]+': [' + filled + empty + ']';
      log.innerText = lines.join('\n');
      if(progress >= 20){ clearInterval(interval); current++; setTimeout(nextModule, 100); }
    }, 30);
  }
  nextModule();
}

function initTerminal(){
  canvas.style.display='none';
  document.getElementById('terminalTitle').classList.add('visible');
  document.getElementById('terminalUI').classList.add('visible');
  loadScene('start');
}

function getBrowserNameSync() {
    const ua = navigator.userAgent;
    if (navigator.brave && typeof navigator.brave.isBrave === 'function') {return "Brave";}
    if (ua.includes("OPR")) return "Opera";
    if (ua.includes("Firefox")) return "Mozilla Firefox";
    if (ua.includes("Edg")) return "Microsoft Edge";
    if (ua.includes("Chrome")) return "Google Chrome";
    if (ua.includes("Safari")) return "Apple Safari";
    return "Unknown Browser";
}

const scenes={};
const projectsData=[
  { 
    name:"project1", 
    url: "project1.html", 
    description:"PLACEHOLDER DESCRIPTION", 
    updates:[
        { date:"YYYY-MM-DD", content:"PLACEHOLDER UPDATE 1" },
        { date:"YYYY-MM-DD", content:"PLACEHOLDER UPDATE 2" }
    ] 
  },
  { 
    name:"project2", 
    url: "project2.html", 
    description:"PLACEHOLDER DESCRIPTION", 
        updates:[
        { date:"YYYY-MM-DD", content:"PLACEHOLDER UPDATE 1" },
        { date:"YYYY-MM-DD", content:"PLACEHOLDER UPDATE 2" }
    ] 
  }
];

function buildProjects(){
  scenes.start={id:'start', text:`Location: /home/user\n\nWelcome. Use 'help' to begin.`,choices:[{text:"Projects",next:"projects"},{text:"About",next:"about"},{text:"Contact",next:"contact"}]};
  scenes.about={id:'about', text:`Location: /home/user/about\n\nName: Live00Wire \nFocus: Random Insanity \nI do alot of things, i hope you like them!`,choices:[{text:"Return",next:"start"}]};
  scenes.contact={id:'contact', text:`Location: /home/user/contact\n\nEmail: `,choices:[{text:"Return",next:"start"}]};

  projectsData.forEach((proj,i)=>{
    const projectId=`project_${i}`;
    const readmeId=`project_${i}_readme`;
    
    scenes[readmeId] = {
        id: readmeId,
        text: `File: README.txt\n----------------\n${proj.description}`,
        choices: [{text:"Return", next: projectId}]
    };

    let projectDirView = `Location: /home/user/projects/${proj.name.toLowerCase()}\n\nREADME.txt\nLAUNCH_PROJECT.exe\n`;
    const updateChoices = proj.updates.map((u,j)=>{
      const logId = `project_${i}_update_${j}`;
      projectDirView += `${u.date}.log\n`;
      scenes[logId]={id:logId, text:`Update Log: ${u.date}\n------------------\n${u.content}`,choices:[{text:"Return",next:projectId}]};
      return {text: u.date + ".log", next: logId};
    });

    scenes[projectId]={
        id:projectId, 
        text: `${projectDirView}\nType 'cat [filename]' or select a file below.`, 
        choices: [
            {text: "README.txt", next: readmeId},
            {text: "LAUNCH_PROJECT.exe", next: proj.url},
            ...updateChoices,
            {text:"Return",next:"projects"}
        ]
    };
  });
  
  let dirOutput = "Location: /home/user/projects\n\n" + projectsData.map(p => p.name + "/").join("\n");
  scenes.projects={id:'projects', text:dirOutput + "\n\nSelect a folder or 'cd ..'",choices:projectsData.map((p,i)=>({text:p.name,next:`project_${i}`})).concat([{text:"Return",next:"start"}])};
}
buildProjects();

let currentChoices=[],typedCommand="",typing=false,buttonsVisible=false,currentSceneId='start';
let commandHistory = [], historyIndex = -1;

function updateTyped(){document.getElementById("typed").innerText=typedCommand;}

function typeToLog(text, callback) {
  typing = true; log.innerText = ""; let i = 0;
  const interval = setInterval(() => {
    log.innerText += text[i]; i++;
    if (i >= text.length) { clearInterval(interval); typing = false; if (callback) callback(); }
  }, 5);
}

function typeCommand(text,callback){
    if(typing)return; typing=true; typedCommand=""; updateTyped(); let i=0;
    let interval=setInterval(()=>{
        if(i>=text.length){ clearInterval(interval); setTimeout(()=>{typing=false;callback();},150); return;}
        typedCommand+=text[i]; updateTyped(); i++;
    },30);
}

function loadScene(id){
  if(id.endsWith('.html')){
      log.innerText = "Redirecting to external project page...";
      setTimeout(() => window.location.href = id, 800);
      return;
  }
  currentSceneId = id;
  const scene=scenes[id];
  typedCommand=""; updateTyped();
  typeToLog(scene.text, () => {
      choicesDiv.innerHTML='';
      currentChoices=scene.choices;
      scene.choices.forEach(choice=>{
        const div=document.createElement('div');
        div.className='choice' + (buttonsVisible ? ' visible' : '');
        div.innerText='> '+choice.text;
        div.onclick=()=>{typeCommand(choice.text,()=>{loadScene(choice.next);});};
        choicesDiv.appendChild(div);
      });
  });
}

const knownCommands = {
  help:{text:"Available Commands:\n- ls:          List files\n- cd [path]:   Change directory\n- cat [file]:  Read file\n- neofetch:    System info\n- clear:       Clear screen\n- reboot:      Restart system\n- showbuttons: Enable UI buttons\n- hidebuttons: Disable UI buttons"},
  
  ls: {
      execute: () => {
          let items = [];
          if (currentSceneId === 'start') items = ["projects/", "about/", "contact/"];
          else if (currentSceneId === 'projects') items = projectsData.map(p => p.name.toLowerCase() + "/");
          else if (currentSceneId.startsWith('project_') && !currentSceneId.includes('update') && !currentSceneId.includes('readme')) {
              const idx = currentSceneId.split('_')[1];
              items = ["README.txt", "LAUNCH_PROJECT.exe"].concat(projectsData[idx].updates.map(u => u.date + ".log"));
          } else return "Empty directory.";
          return items.join("\n");
      }
  },
  neofetch: {
    execute: () => {
        const uptime = Math.floor((Date.now() - startTime) / 1000);
        return `
████████████████████████████████████████████
████████████████████████████████████████████
████████████████████████████████████████████
███████████████████████████░░░░░████████████
███████████████████████████░░░░░████████████
██░░░██████████████████████░░░░░████████████
██░░░░░░░░█████████████████░░░░░████████████
███░░░░░░░░░░░█████████████░░░░░████████████
████████░░░░░░░░███████████░░░░░████████████
████████░░░░░░░░███████████░░░░░████████████
███░░░░░░░░░░░█████████████░░░░░████████████
██░░░░░░░░█████████████████░░░░░████████████
██░░░██████████████████████░░░░░░░░░░░░░░░██
███████████████████████████░░░░░░░░░░░░░░░██
████████████████████████████████████████████
████████████████████████████████████████████
████████████████████████████████████████████

USER:    guest@dev-terminal
OS:      ${navigator.platform}
KERNEL:  custom-js-kernel v3.5
UPTIME:  ${uptime}s
BROWSER: ${getBrowserName()}
SHELL:   custom-js-shell
        `;
    }
  },
  showbuttons: { text: "UI Elements: ENABLED", action: () => { buttonsVisible = true; document.querySelectorAll('.choice').forEach(c => c.classList.add('visible')); }},
  hidebuttons: { text: "UI Elements: DISABLED", action: () => { buttonsVisible = false; document.querySelectorAll('.choice').forEach(c => c.classList.remove('visible')); }},
  clear:{text:"", action:()=>{ log.innerText = "Buffer Cleared.\nReady."; }},
  reboot:{text:"Rebooting...", action:()=>{ setTimeout(()=>location.reload(), 1000); }}
};

function tryCommand(){
  const input = typedCommand.trim(); if(!input) return;
  commandHistory.push(input); historyIndex = commandHistory.length;
  const fullCmd = input.toLowerCase();
  const parts = fullCmd.split(' ');
  const cmd = parts[0];
  const arg = parts[1];

  if(cmd === 'cat' && arg) {
      if(currentSceneId.startsWith('project_')) {
          const idx = currentSceneId.split('_')[1];
          const proj = projectsData[idx];
          if(arg === 'readme.txt') loadScene(`project_${idx}_readme`);
          else if(arg === 'launch_project.exe') loadScene(proj.url);
          else {
              const uIdx = proj.updates.findIndex(u => (u.date + ".log").toLowerCase() === arg);
              if(uIdx !== -1) loadScene(`project_${idx}_update_${uIdx}`);
              else log.innerText = `cat: ${arg}: No such file.`;
          }
      } else log.innerText = `cat: ${arg}: Not a readable file here.`;
      typedCommand=''; updateTyped(); return;
  }

  if(cmd === 'cd') {
    if(!arg || arg === '..' || arg === 'home') {
        if (currentSceneId.startsWith('project_')) loadScene('projects');
        else loadScene('start');
    } else {
        const target = arg.replace('projects/', '');
        if(arg === 'projects') loadScene('projects');
        else if(arg === 'about') loadScene('about');
        else if(arg === 'contact') loadScene('contact');
        else {
            let idx = projectsData.findIndex(p => p.name.toLowerCase() === target);
            if(idx !== -1) loadScene(`project_${idx}`);
            else log.innerText = `cd: no such directory: ${arg}`;
        }
    }
    typedCommand=''; updateTyped(); return;
  }

  if(knownCommands[cmd]){
    const result = knownCommands[cmd].execute ? knownCommands[cmd].execute() : knownCommands[cmd].text;
    typeToLog(result, () => { if(knownCommands[cmd].action) knownCommands[cmd].action(); });
    typedCommand=''; updateTyped(); return;
  }
  
  for(let choice of currentChoices){
    if(choice.text.toLowerCase() === fullCmd){ loadScene(choice.next); typedCommand=''; updateTyped(); return; }
  }
  
  log.innerText = `Command '${cmd}' not found. Type 'help' for assistance.`;
  typedCommand=''; updateTyped();
}

document.addEventListener('keydown',e=>{
  if(typing)return;
  if(e.key==='Tab') e.preventDefault();
  if(e.key==='ArrowUp' && historyIndex > 0){ historyIndex--; typedCommand = commandHistory[historyIndex]; updateTyped(); }
  if(e.key==='ArrowDown' && historyIndex < commandHistory.length - 1){ historyIndex++; typedCommand = commandHistory[historyIndex]; updateTyped(); }
  if(e.key==='Enter'){ tryCommand(); return; }
  if(e.key==='Backspace'){ typedCommand=typedCommand.slice(0,-1); updateTyped(); return; }
  if(e.key.length===1){ typedCommand+=e.key; updateTyped(); }
});
</script>
</body>
</html>
