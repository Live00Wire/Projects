<!DOCTYPE html>
<html lang="en">
<head>
<link rel="shortcut icon" type="image/x-icon" href="favicon-96x96.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>>L Terminal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap');

:root {
    --green: #33ff66;
    --bg-main: #050505;
    --bg-monitor: #1a1a1a;
    --bg-bezel: #0a0a0a;
    --bg-term: #020502;
}

body { 
    background: var(--bg-main); 
    color: var(--green); 
    font-family: 'Doto', sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    margin: 0; 
    overflow-x: hidden; 
    padding: 20px;
    box-sizing: border-box;
}

#monitor {
    background: var(--bg-monitor);
    padding: 25px 30px 50px 30px;
    border-radius: 40px;
    border-bottom: 18px solid #111;
    border-right: 10px solid #111;
    box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 2px 5px rgba(255,255,255,0.05);
    position: relative;
    display: inline-block;
    max-width: 100%;
}

#monitor::after {
    content: "";
    position: absolute;
    bottom: 15px;
    right: 40px;
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--green);
    animation: ledPulse 3s infinite ease-in-out;
}

#bezel {
    background: var(--bg-bezel);
    padding: 20px;
    border-radius: 30px;
    box-shadow: inset 0 0 40px rgba(0,0,0,1);
    border: 4px solid #151515;
}

#terminal { 
    width: 950px; 
    height: 650px; 
    max-width: 100%; 
    background: var(--bg-term); 
    border-radius: 20px;
    padding: 40px; 
    position: relative;
    overflow: hidden; 
    transform: perspective(1000px) rotateX(0.5deg);
    box-shadow: inset 0 0 100px rgba(51, 255, 102, 0.05);
    animation: screenTurnOn 0.5s ease-out;
    box-sizing: border-box;
}

#terminal-content {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    z-index: 2;
    padding-right: 15px; 
    scrollbar-width: thin;
    scrollbar-color: var(--green) transparent;
}

#terminal-content::-webkit-scrollbar {
    width: 8px;
}

#terminal-content::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 4px;
}

#terminal-content::-webkit-scrollbar-thumb {
    background: var(--green);
    border-radius: 4px;
    box-shadow: 0 0 5px var(--green);
}

#terminal-content::-webkit-scrollbar-thumb:hover {
    background: #fff;
}

#terminal::before, #terminal::after {
    content: " ";
    display: block;
    position: absolute;
    inset: 0;
    pointer-events: none;
}

#terminal::before {
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    z-index: 10;
    background-size: 100% 3px, 3px 100%;
    opacity: 0.7;
}

#terminal::after {
    background: radial-gradient(circle, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.6) 100%);
    z-index: 11;
}

h1 { 
    margin-top: 0; 
    font-size: 1.6rem; 
    text-transform: uppercase; 
    letter-spacing: 2px; 
    text-shadow: 0 0 8px var(--green); 
}

#log { 
    min-height: 280px; 
    white-space: pre-wrap; 
    word-wrap: break-word; 
    line-height: 1.5; 
    font-size: 1.2rem; 
    text-shadow: 0 0 5px rgba(51,255,102,0.4); 
}

#inputLine { 
    margin-top: 15px; 
    font-size: 1.3rem; 
    display: flex; 
    align-items: center; 
}

#typed { word-break: break-all; }

#choices { margin-top: 15px; }

.cursor { 
    display: inline-block; 
    width: 10px; 
    height: 22px; 
    background: var(--green); 
    margin-left: 4px; 
    animation: blink 1s infinite; 
    flex-shrink: 0; 
}

.choice { 
    display: none; 
    background: rgba(51, 255, 102, 0.08); 
    border: 1px solid var(--green); 
    color: var(--green); 
    padding: 14px; 
    margin-top: 10px; 
    text-align: left; 
    cursor: pointer; 
    font-size: 1.1rem; 
    transition: 0.2s;
}

.choice.visible { display: block; }
.choice:hover { background: var(--green); color: black; box-shadow: 0 0 15px var(--green); }

#footer { margin-top: 40px; font-size: 12px; opacity: .4; padding-bottom: 20px; }
#terminalUI { opacity: 0; transition: opacity 1.5s ease-in-out; }
#terminalUI.visible { opacity: 1; }
a { color: var(--green); text-decoration: underline; font-weight: bold; }

@keyframes blink { 50% { opacity: 0 } }
@keyframes ledPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes screenTurnOn {
    0% { transform: scaleY(0.01) scaleX(0); filter: brightness(10); }
    60% { transform: scaleY(0.01) scaleX(1); filter: brightness(4); }
    100% { transform: scaleY(1) scaleX(1); filter: brightness(1); }
}

@media (max-width: 768px) {
    body { padding: 5px; }
    #monitor { padding: 10px 10px 30px 10px; border-radius: 20px; width: 100%; box-sizing: border-box; }
    #bezel { padding: 8px; border-radius: 15px; }
    #terminal { min-height: 550px; padding: 15px; border-radius: 10px; transform: none; }
    #log { font-size: 1.1rem; }
    h1 { font-size: 1.2rem; }
    .choice { font-size: 1rem; padding: 12px; }
}
</style>
</head>
<body>

<div id="monitor">
  <div id="bezel">
    <div id="terminal">
      <div id="terminal-content">
          <h1 id="terminalTitle">&gt; >L_OS v3.5</h1>
          <div id="log"></div>
          <div id="terminalUI">
            <div id="inputLine">&gt; <span id="typed"></span><span class="cursor"></span></div>
            <div id="choices"></div>
            <div id="footer">Created By Live00Wire | <a href="https://www.buymeacoffee.com/live00wire" target="_blank">Buy me a coffee</a>
            <br>
            <a href="#" id="mobileToggle">I'm on mobile</a></div>
          </div>
      </div>
    </div>
  </div>
</div>

<script>
const DOM = {
    content: document.getElementById('terminal-content'),
    log: document.getElementById('log'),
    choices: document.getElementById('choices'),
    typed: document.getElementById('typed'),
    terminalUI: document.getElementById('terminalUI'),
    mobileToggle: document.getElementById('mobileToggle')
};

const startTime = Date.now();
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
const scenes = {};
const projectsData = [
    { name: "Coding Projects", url: "/desktop", description: "Mock desktop environment to explore my random projects", updates: [{ date: "2026-03-26", content: "Basic functionality" }] },
    { name: "Music", url: "/construction", description: "Music page for browsing my tracks", updates: [{ date: "2026-03-26", content: "Created Music Page" }] }
];

let currentChoices = [];
let typedCommand = "";
let typing = false;
let buttonsVisible = isMobile;
let currentSceneId = 'start';
let commandHistory = [];
let historyIndex = -1;

const scrollToBottom = () => { DOM.content.scrollTop = DOM.content.scrollHeight; };
const scrollToTop = () => { DOM.content.scrollTop = 0; };
const updateTyped = () => { 
    DOM.typed.innerText = typedCommand; 
    scrollToBottom(); 
};

setTimeout(startProgressBars, 500);

function startProgressBars() {
    DOM.log.innerText = '';
    const modules = ['Init BIOS', 'Load Data', 'Handshake', 'Ready'];
    let current = 0;

    function nextModule() {
        if (current >= modules.length) { 
            initTerminal(); 
            return; 
        }
        DOM.log.innerText += `${modules[current]}: []\n`;
        let progress = 0;
        
        const interval = setInterval(() => {
            progress++;
            const filled = '█'.repeat(progress);
            const empty = '-'.repeat(20 - progress);
            const lines = DOM.log.innerText.split('\n');
            lines[lines.length - 2] = `${modules[current]}: [${filled}${empty}]`;
            DOM.log.innerText = lines.join('\n');
            scrollToBottom(); 
            
            if (progress >= 20) { 
                clearInterval(interval); 
                current++; 
                setTimeout(nextModule, 80); 
            }
        }, 15);
    }
    nextModule();
}

function initTerminal() {
    DOM.terminalUI.classList.add('visible');
    loadScene('start');
}

function buildProjects() {
    scenes.start = { id: 'start', text: `Location: /home/user\n\nWelcome to the my Dev Terminal (Blog)\nUse 'help' for commands or select a path below.`, choices: [{text: "Projects", next: "projects"}, {text: "About", next: "about"}, {text: "Contact", next: "contact"}] };
    scenes.about = { id: 'about', text: `Location: /home/user/about\n\nName: Live00Wire\nFocus: Breaking things until they work.\nStatus: Online`, choices: [{text: "Return", next: "start"}] };
    scenes.contact = { id: 'contact', text: `Location: /home/user/contact\n\nEmail: hello@live00wire.dev\nDiscord: live__wire`, choices: [{text: "Return", next: "start"}] };
  
    projectsData.forEach((proj, i) => {
        const pId = `project_${i}`;
        const rId = `${pId}_readme`;
        scenes[rId] = { id: rId, text: `File: README.txt\n----------------\n${proj.description}`, choices: [{text: "Return", next: pId}] };
        
        let dirView = `Location: /home/user/projects/${proj.name.toLowerCase()}\n\nREADME.txt\nLAUNCH_PROJECT.exe\n`;
        const updateChoices = proj.updates.map((u, j) => {
            const logId = `${pId}_update_${j}`;
            dirView += `${u.date}.log\n`;
            scenes[logId] = { id: logId, text: `Log: ${u.date}\n----------\n${u.content}`, choices: [{text: "Return", next: pId}] };
            return { text: `${u.date}.log`, next: logId };
        });
        
        scenes[pId] = { id: pId, text: `${dirView}\nSelect a file below.`, choices: [{text: "README.txt", next: rId}, {text: "LAUNCH_PROJECT.exe", next: proj.url}, ...updateChoices, {text: "Return", next: "projects"}] };
    });
  
    scenes.projects = { id: 'projects', text: `Location: /home/user/projects\n\n${projectsData.map(p => p.name + "/").join("\n")}\n\nSelect a folder.`, choices: [...projectsData.map((p, i) => ({text: p.name, next: `project_${i}`})), {text: "Return", next: "start"}] };
}

buildProjects();

function typeToLog(text, callback) {
    typing = true; 
    DOM.log.innerText = ""; 
    scrollToTop(); 
    
    let i = 0;
    const interval = setInterval(() => {
        DOM.log.innerText += text[i++];
        if (i >= text.length) { 
            clearInterval(interval); 
            typing = false; 
            if (callback) callback(); 
        }
    }, 5);
}

function typeCommand(text, callback) {
    if (typing) return; 
    typing = true; 
    typedCommand = ""; 
    updateTyped(); 
    let i = 0;
    const interval = setInterval(() => {
        if (i >= text.length) { 
            clearInterval(interval); 
            setTimeout(() => { typing = false; callback(); }, 100); 
            return;
        }
        typedCommand += text[i++]; 
        updateTyped();
    }, 30);
}

function loadScene(id) {
    if (id.startsWith('/')) {
        DOM.log.innerText = "Redirecting to project layer...";
        scrollToTop();
        setTimeout(() => window.location.href = id, 800);
        return;
    } 
    currentSceneId = id;
    const scene = scenes[id];
    typedCommand = ""; 
    DOM.typed.innerText = typedCommand; 
    
    typeToLog(scene.text, () => {
        DOM.choices.innerHTML = '';
        currentChoices = scene.choices;
        scene.choices.forEach(choice => {
            const div = document.createElement('div');
            div.className = `choice ${buttonsVisible ? 'visible' : ''}`;
            div.innerText = `> ${choice.text}`;
            div.onclick = () => typeCommand(choice.text, () => loadScene(choice.next));
            DOM.choices.appendChild(div);
        });
    });
}

const toggleButtons = (state) => {
    buttonsVisible = state;
    document.querySelectorAll('.choice').forEach(c => c.classList.toggle('visible', state));
};

const knownCommands = {
    help: { text: "Commands:\n- ls: List files\n- cd [dir]: Change dir\n- neofetch: System info\n- clear: Clear screen\n- reboot: Restart system\n- showbuttons: Enable UI buttons\n- hidebuttons: Disable UI buttons" },
    ls: { execute: () => {
        if (currentSceneId === 'start') return "projects/  about/  contact/";
        if (currentSceneId === 'projects') return projectsData.map(p => `${p.name.toLowerCase()}/`).join("  ");
        return "README.txt  LAUNCH_PROJECT.exe";
    }},
    neofetch: { execute: () => `USER: guest\nOS: LiveWire-OS v3.5\nUPTIME: ${Math.floor((Date.now() - startTime) / 1000)}s\nSHELL: custom-sh` },
    showbuttons: { text: "Buttons: ENABLED", action: () => toggleButtons(true) },
    hidebuttons: { text: "Buttons: DISABLED", action: () => toggleButtons(false) },
    clear: { text: "", action: () => DOM.log.innerText = "Buffer Cleared." },
    reboot: { text: "Rebooting...", action: () => setTimeout(() => location.reload(), 800) }
};

function tryCommand() {
    const input = typedCommand.trim(); 
    if (!input) return;
    
    commandHistory.push(input); 
    historyIndex = commandHistory.length;
    
    const [cmd, arg] = input.toLowerCase().split(' ');

    if (cmd === 'cat' && arg) {
        if (currentSceneId.startsWith('project_')) {
            const idx = currentSceneId.split('_')[1];
            arg === 'readme.txt' ? loadScene(`project_${idx}_readme`) : typeToLog(`cat: ${arg}: File not found.`);
        } else {
            typeToLog("cat: No files here.");
        }
        resetInput(); return;
    }
    
    if (cmd === 'cd') {
        if (!arg || arg === '..') loadScene(currentSceneId.startsWith('project_') ? 'projects' : 'start');
        else if (['projects', 'about'].includes(arg)) loadScene(arg);
        else {
            const idx = projectsData.findIndex(p => p.name.toLowerCase() === arg);
            idx !== -1 ? loadScene(`project_${idx}`) : typeToLog(`cd: no such directory: ${arg}`);
        }
        resetInput(); return;
    }
    
    if (knownCommands[cmd]) {
        const result = knownCommands[cmd].execute ? knownCommands[cmd].execute() : knownCommands[cmd].text;
        typeToLog(result, () => { if (knownCommands[cmd].action) knownCommands[cmd].action(); });
        resetInput(); return;
    }
    
    const matchedChoice = currentChoices.find(c => c.text.toLowerCase() === input.toLowerCase());
    if (matchedChoice) {
        loadScene(matchedChoice.next);
        resetInput(); return;
    }
    
    typeToLog(`Unknown command. Type 'help'.`);
    resetInput();
}

function resetInput() {
    typedCommand = ''; 
    DOM.typed.innerText = typedCommand; 
}

DOM.mobileToggle.addEventListener('click', e => {
    e.preventDefault();
    toggleButtons(true);
    if (!typing) {
        DOM.log.innerText = "System UI overridden: Buttons ENABLED.";
        scrollToTop();
    }
});

document.addEventListener('keydown', e => {
    if (typing) return;
    
    if (e.key === 'Enter') { 
        tryCommand(); 
        return; 
    }
    
    if (e.key === 'Backspace') { 
        typedCommand = typedCommand.slice(0, -1); 
        updateTyped(); 
        return; 
    }
    
    if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIndex > 0) {
            historyIndex--;
            typedCommand = commandHistory[historyIndex];
            updateTyped();
        }
        return;
    }
    
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex < commandHistory.length - 1) {
            historyIndex++;
            typedCommand = commandHistory[historyIndex];
            updateTyped();
        } else if (historyIndex === commandHistory.length - 1) {
            historyIndex++;
            typedCommand = '';
            updateTyped();
        }
        return;
    }
    
    if (['ArrowLeft', 'ArrowRight', 'Escape', 'Tab'].includes(e.key)) return;

    if (e.key.length === 1) { 
        typedCommand += e.key; 
        historyIndex = commandHistory.length; 
        updateTyped(); 
    }
});
</script>
</body>
</html>
